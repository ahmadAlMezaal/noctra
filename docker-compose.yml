# One-command Noctra via Docker.
#
#   1. Create .env  (copy .env.example, fill in keys — see "Docker" in the README)
#   2. Declare each repo in its Linear project description (a `Repo: owner/name`
#      line — use an HTTPS URL or owner/name so GH_TOKEN works)
#   3. docker compose up -d
#
# Pull the published image, or uncomment `build: .` to build from this checkout.
services:
  noctra:
    image: ghcr.io/ahmadalmezaal/noctra:latest
    # build: .
    env_file: .env
    volumes:
      # Persists the repos cache, worktrees, logs, and PR cursor.
      - ./data:/data
    restart: unless-stopped
