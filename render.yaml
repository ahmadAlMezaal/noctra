# Render Blueprint — run Noctra as a background worker.
#
#   1. Push this repo (or your fork) to GitHub.
#   2. Render Dashboard → New → Blueprint → pick the repo.
#   3. Fill in the secret env vars (marked sync:false) when prompted.
#
# A worker has no public URL. The disk persists /data (repos cache, worktrees,
# logs, PR cursor). Repos are declared per-project in Linear (a `Repo: owner/name`
# line in the project description) — nothing to configure here.
services:
  - type: worker
    name: noctra
    runtime: image
    image:
      url: ghcr.io/ahmadalmezaal/noctra:latest
    plan: starter
    disk:
      name: noctra-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: AGENT_BACKEND
        value: claude
      - key: LINEAR_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY   # or OPENAI_API_KEY for AGENT_BACKEND=codex
        sync: false
      - key: GH_TOKEN
        sync: false
