# GoReleaser config — cross-compiles Nightshift and publishes a GitHub Release
# with archives + checksums on every pushed `v*` tag. See .github/workflows/release.yml.
#
#   Local dry run:  goreleaser release --snapshot --clean
#   Validate:       goreleaser check
version: 2

project_name: nightshift

before:
  hooks:
    - go mod tidy

builds:
  - id: nightshift
    main: ./cmd/nightshift
    binary: nightshift
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    ignore:
      # No 32-bit arm builds for macOS.
      - goos: darwin
        goarch: arm

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

release:
  github:
    owner: ahmadAlMezaal
    name: nightshift
  draft: false
  prerelease: auto

homebrew_casks:
  - name: nightshift
    binaries:
      - nightshift
    repository:
      owner: ahmadAlMezaal
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: nightshift-bot
      email: nightshift-bot@users.noreply.github.com
    homepage: https://getnightshift.dev
    description: >-
      Autonomous Linear-to-PR agent — polls Linear for tickets, implements
      them with Claude Code or OpenAI Codex, and creates pull requests.
    # The release binaries are unsigned, so macOS quarantines them after a cask
    # download and Gatekeeper blocks the first run. Strip the quarantine xattr
    # on install so `nightshift` runs straight away.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/nightshift"]
          end
