# GoReleaser config — cross-compiles Noctra and publishes a GitHub Release
# with archives + checksums on every pushed `v*` tag. See .github/workflows/release.yml.
#
#   Local dry run:  goreleaser release --snapshot --clean
#   Validate:       goreleaser check
version: 2

project_name: noctra

before:
  hooks:
    - go mod tidy

builds:
  - id: noctra
    main: ./cmd/noctra
    binary: noctra
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    ignore:
      # No 32-bit arm builds for macOS.
      - goos: darwin
        goarch: arm

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^feat(\(.+\))?!?:'
      order: 0
    - title: Bug Fixes
      regexp: '^fix(\(.+\))?!?:'
      order: 1
    - title: Performance
      regexp: '^perf(\(.+\))?!?:'
      order: 2
    - title: Refactoring
      regexp: '^refactor(\(.+\))?!?:'
      order: 3
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

release:
  github:
    owner: ahmadAlMezaal
    name: noctra
  draft: false
  prerelease: auto

homebrew_casks:
  - name: noctra
    binaries:
      - noctra
    repository:
      owner: ahmadAlMezaal
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: noctra-bot
      email: noctra-bot@users.noreply.github.com
    homepage: https://getnoctra.dev
    description: >-
      Autonomous Linear-to-PR agent — polls Linear for tickets, implements
      them with Claude Code or OpenAI Codex, and creates pull requests.
    # The release binaries are unsigned, so macOS quarantines them after a cask
    # download and Gatekeeper blocks the first run. Strip the quarantine xattr
    # on install so `noctra` runs straight away.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/noctra"]
          end
